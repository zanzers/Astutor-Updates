{% extends "base.html" %}

{% block title %}Login - Astutor{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2 id="authTitle">Login to Astutor</h2>
            <p id="authSubtitle">Welcome back! Please sign in to your account.</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" method="POST" action="" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <!-- Signup Form (Hidden by default) -->
        <form id="signupForm" method="POST" action="" class="auth-form" style="display: none;">
            <div class="form-group">
                <label for="signup_full_name">Full Name</label>
                <input type="text" id="signup_full_name" name="full_name" required>
            </div>
            
            <div class="form-group">
                <label for="signup_username">Username</label>
                <input type="text" id="signup_username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="signup_email">Email</label>
                <input type="email" id="signup_email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="signup_password">Password</label>
                <input type="password" id="signup_password" name="password" required>
            </div>
            
            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_tutor">
                    <span class="checkmark"></span>
                    Terms of Conditions
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
        </form>

        <div class="auth-switch">
            <p id="switchText">Don't have an account? 
                <a href="#" id="switchLink">Sign up here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
